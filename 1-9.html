<style>
  :root {
    --bg-main: #f8fafc;

    --text-secondary: #64748b;
    --border-color: #e2e8f0;
    --primary-color: #4f46e5;
    --primary-hover: #4338ca;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-main);
    background-image: 
      radial-gradient(at 0% 0%, hsla(253,16%,7%,0.03) 0, transparent 50%), 
      radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%), 
      radial-gradient(at 100% 0%, hsla(339,49%,30%,0.03) 0, transparent 50%);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem;
  }

  .wrap {
    max-width: 1000px;
    margin: 0 auto;
  }

  h1.title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: var(--text-primary);
    text-align: center;
  }

  .grade-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    justify-content: center;
  }

  .gbtn {
    border: 1px solid var(--border-color);
    border-radius: 99px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: var(--card-bg);
    color: var(--text-secondary);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .gbtn.active {
    background: var(--primary-color);
    border-color: var(--primary-color);
    color: #fff;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    transform: translateY(-1px);
  }

  .gbtn:hover:not(.active) {
    background: #f1f5f9;
    color: var(--text-primary);
  }

  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    justify-content: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 99px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .b-stem { background: #dcfce7; color: #166534; }
  .b-comp { background: #dbeafe; color: #1e40af; }
  .b-ai { background: #f3e8ff; color: #6b21a8; }
  .b-proj { background: #ffedd5; color: #9a3412; }
  .b-show { background: #fee2e2; color: #991b1b; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
    overflow: hidden;
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-color);
    background: rgba(248, 250, 252, 0.5);
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(10px);
  }

  .card-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .card-sub {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    background: #f1f5f9;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .tbl-wrap {
    overflow-x: auto;
  }

  .tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    table-layout: fixed;
  }

  .tbl th {
    background: var(--card-bg);
    color: var(--text-secondary);
    font-weight: 600;
    padding: 14px 20px;
    text-align: left;
    border-bottom: 2px solid var(--border-color);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tbl td {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-color);
    vertical-align: top;
    color: var(--text-primary);
    transition: background-color 0.15s ease;
  }

  .tbl tr:last-child td {
    border-bottom: none;
  }

  .tbl tr:hover td {
    background: #f8fafc;
  }

  .daynum { font-weight: 700; color: var(--text-secondary); width: 60px; }
  .type-cell { width: 120px; }
  .topic-cell { width: 220px; font-weight: 600; color: var(--text-primary); }
  .act-cell { color: var(--text-secondary); line-height: 1.5; }
  .time-cell { width: 80px; color: var(--text-secondary); font-weight: 500; white-space: nowrap; text-align: right; }

  @media (max-width: 768px) {
    body { padding: 1rem; }
    .card-head { flex-direction: column; align-items: flex-start; gap: 8px; }
  }
</style>
</head>

const typeBadge=(t)=>`<span class="badge ${T[t]}">${TL[t]}</span>`;
const gradeInfo={
  1:"Age 6–7 · 45 min sessions",
  2:"Age 7–8 · 45 min sessions",
  3:"Age 8–9 · 45 min sessions",
  4:"Age 9–10 · 45 min sessions",
  5:"Age 10–11 · 45 min sessions",
  6:"Age 11–12 · 45 min sessions",
  7:"Age 12–13 · 45 min sessions",
  8:"Age 13–14 · 45 min sessions",
  9:"Age 14–15 · 45–60 min sessions"
};

let currentGrade=1;

function renderGrade(g){
  currentGrade=g;
  document.getElementById('cardTitle').textContent=`Grade ${g} — 30-Day Plan`;
  document.getElementById('cardSub').textContent=gradeInfo[g];
  const data=plans[g].days;
  const tbody=document.getElementById('planBody');
  tbody.innerHTML=data.map(([d,t,topic,act,tm])=>
    `<tr>
      <td class="daynum">${d}</td>
      <td class="type-cell">${typeBadge(t)}</td>
      <td class="topic-cell">${topic}</td>
      <td class="act-cell">${act}</td>
      <td class="time-cell">${tm} min</td>
    </tr>`
  ).join('');
  document.querySelectorAll('.gbtn').forEach(b=>{
    b.classList.toggle('active',parseInt(b.dataset.g)===g)
  });
}

const bar=document.getElementById('gradeBar');
for(let i=1;i<=9;i++){
  const b=document.createElement('button');
  b.className='gbtn';
  b.dataset.g=i;
  b.textContent=`Grade ${i}`;
  b.onclick=()=>renderGrade(i);
  bar.appendChild(b);
}
renderGrade(1);
</script>
